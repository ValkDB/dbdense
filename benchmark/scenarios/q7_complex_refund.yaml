id: q7_complex_refund
label: complex_refund_cancel
category: regular
prompt: >
  How many unique customers have at least one refunded payment AND also have
  at least one cancelled order? Don't count deleted users or test accounts
  (emails matching @internal.com, @test.com, +test@, or @localhost).
verification:
  response:
    numeric_equals:
      refund_cancel_users: 200
