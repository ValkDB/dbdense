id: q3_stress
label: stress_aggregation
category: stress
prompt: >
  Break it down by payment provider and shipping region — how many shipped
  orders had a payment fail after retrying and the package never got delivered
  (no delivery date recorded) last quarter of 2024? Skip test accounts
  (emails matching @internal.com, @test.com, +test@, or @localhost) and
  deleted users. How many groups and what's the total across all groups?
  Return JSON with keys group_count and late_failed_total.
verification:
  response:
    numeric_equals:
      group_count: 2
      late_failed_total: 98
