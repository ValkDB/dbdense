entities:
  users:
    description: >
      Core identity table. Benchmark/business hint: treat a "premium user" as a
      user with paid order spend >= 500 USD in the trailing 90 days unless a
      stricter product rule is provided by the caller.
    fields:
      email:
        description: >
          Login email. Exclude internal/test accounts using patterns like
          *@internal.com, *@test.com, %+test@*, *@localhost.

  orders:
    description: >
      Customer orders. For lifecycle filtering, use orders.payload.status as the
      source of truth.
    fields:
      payload:
        description: >
          JSONB schema_hint: {
          status: pending|confirmed|shipped|delivered|cancelled,
          channel: web|mobile|partner|api,
          priority: normal|high|urgent,
          items: [{sku:string, qty:int, price:numeric}],
          shipping: {carrier:string, tracking_id:string, shipped_at:timestamptz}
          }. Query paths: payload->>'status', payload->'items',
          payload->'shipping'->>'carrier'.

  payments:
    description: Payment attempts and settlement state.
    fields:
      retry_count:
        description: >
          Failed payment retry signal: retry_count > 0 with non-settled status
          (pending|authorized|failed).
      provider:
        description: >
          Provider used for breakdown reports (stripe|adyen|paypal|braintree).

  shipments:
    description: >
      Shipment and delivery tracking records. SLA definition: shipment is late
      when shipped_at is older than 7 days and delivered_at is NULL, or
      delivered_at > shipped_at + interval '7 days'.
    fields:
      region:
        description: >
          Region bucket for reporting (na-east|na-west|eu-central|ap-south).
